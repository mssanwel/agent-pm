# Agent PM — runtime configuration
# Edit via `/agent-pm set <path> <value>` or in place.
# Changes take effect on the next cron tick — no redeploy needed.

# Timezone and working hours.
# All times in `timezone`. Dispatch exits in pre-flight outside this window.
# Default matches the local system (Asia/Hong_Kong for Kodifly HQ).
# Override via `/agent-pm set timezone Asia/Karachi` if you're in a different zone.
timezone: Asia/Hong_Kong
working_hours:
  enabled: true
  start: "08:00"
  end: "21:00"
  days: [mon, tue, wed, thu, fri, sat]
  # Outside hours → dispatch exits cheap (~1.5K tokens).
  # Set to true if you want feedback (acknowledging corrections) to run 24/7:
  process_feedback_outside_hours: false

# Cron frequency — informational copy of what's registered via CronCreate.
# Change + redeploy via `/agent-pm deploy`.
frequency:
  dispatch_cron: "*/10 * * * *"
  weekly_cron: "0 9 * * 1"
  # Per-phase pacing: skip phase if it ran less than N seconds ago (tracked by
  # timestamps in heartbeat.jsonl).
  min_seconds_between:
    feedback: 0
    triage: 300
    worker: 900

# Caps per run (enforced in the dispatcher).
limits:
  max_feedback_items: 2
  max_triage_items: 2
  max_worker_items: 1
  # Hard stop: if accumulated input+output tokens exceed this, abort remaining
  # phases and comment-explain on the issue in progress.
  max_tokens_per_run: 100000

# Daily cost tracking. Dispatcher tallies approximate spend via usage logs
# and auto-pauses when the hard cap is hit.
cost_caps:
  daily_usd_warn: 10
  daily_usd_stop: 25

# Per-skill overrides. Any top-level key can be overridden per skill.
skill_overrides:
  crm-sync:
    # CRM sync is latency-sensitive (deals are time-critical); run 24/7.
    working_hours: { enabled: false }
  financial-report:
    # Only generate finance packs on Mondays.
    working_hours: { days: [mon] }

# Model selection.
model:
  dispatch: claude-sonnet-4-6
  worker_default: claude-sonnet-4-6
  worker_complex: claude-opus-4-6

# Notifications.
notify:
  on_error: linear_comment        # linear_comment | slack_webhook | email | none
  on_pause: linear_issue
  slack_webhook: ""               # populate for slack_webhook mode
